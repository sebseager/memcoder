# MemCoder evaluation harness — kilo easy v0.
#
# Self-contained: do not reference shine_eval_demo.yaml. All model paths,
# checkpoint settings, and judge configuration live here.

run_name: kilo_easy_v0

artifacts:
  - root: artifacts/antirez__kilo
    difficulties: [easy]
    document_ids: []
    topics: []

conditions: [naive, in_context, shine]
routing: oracle

model:
  # Absolute path to the local HF cache snapshot. The legacy
  # vendor/SHINE/models/Qwen3-8B path does not exist on this machine.
  qwen_base: /home/mms2309/.cache/huggingface/hub/models--Qwen--Qwen3-8B/snapshots/b968826d9c46dd6066d109eabc6255188de91218
  shine_root: vendor/SHINE
  qwen_cuda: 0
  conversation_max_length: 5000
  max_new_tokens: 512
  seed: 42
  lora_r: 8
  metamodel_class_path: LoraQwen.LoraQwen3ForCausalLM
  config_class_path: LoraQwen.Qwen3Config

embedding:
  model: null

judge:
  provider: openai
  model: gpt-5.1
  api_key_env: OPENAI_API_KEY
  dotenv_path: .env
  concurrency: 8
  prompt: prompts/llm_judge_grading_v2.md
  rubric_version: v2
  taxonomy_version: v1
  max_retries: 4
