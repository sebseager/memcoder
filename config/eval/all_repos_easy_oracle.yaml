# MemCoder evaluation harness — all five artifact repos, oracle-routed.
#
# Covers every easy artifact currently prepared under artifacts/. The oracle
# route uses each QA pair's source-document LoRA, so every selected ledger entry
# must have files.lora populated for a complete shine evaluation.

run_name: all_repos_easy_oracle

artifacts:
  - root: artifacts/antirez__kilo
    difficulties: [easy]
    document_ids: []
    topics: []
  - root: artifacts/fogleman__Craft
    difficulties: [easy]
    document_ids: []
    topics: []
  - root: artifacts/marimo-team__marimo
    difficulties: [easy]
    document_ids: []
    topics: []
  - root: artifacts/psf__requests
    difficulties: [easy]
    document_ids: []
    topics: []
  - root: artifacts/pytest-dev__pytest
    difficulties: [easy]
    document_ids: []
    topics: []

conditions: [naive, in_context, shine]
routing: oracle

model:
  qwen_base: /home/mms2309/.cache/huggingface/hub/models--Qwen--Qwen3-8B/snapshots/b968826d9c46dd6066d109eabc6255188de91218
  shine_root: vendor/SHINE
  qwen_cuda: 4
  conversation_max_length: 5000
  max_new_tokens: 512
  seed: 42
  lora_r: 8
  metamodel_class_path: LoraQwen.LoraQwen3ForCausalLM
  config_class_path: LoraQwen.Qwen3Config

embedding:
  model: null

judge:
  provider: openai
  model: gpt-5.1
  api_key_env: OPENAI_API_KEY
  dotenv_path: .env
  concurrency: 8
  prompt: prompts/llm_judge_grading_v2.md
  rubric_version: v2
  taxonomy_version: v1
  max_retries: 4
